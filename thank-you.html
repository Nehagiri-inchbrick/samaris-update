        :root {
            --primary: #C5A059;
            --primary-dark: #A68045;
            --bg-navy: #050a14;
            --text-dark: #1F2937;
        }

        * {

        body {

            background: var(--bg-navy);

            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .ty-header {
            padding: 14px 20px;
            background: #fff;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .ty-header .brand {

            align-items: center;
            text-decoration: none;
        }

        .ty-header .logo-icon {

        }

        .ty-main {

            display: flex;
            align-items: center;

            padding: 40px 20px;
        }

        .ty-card {
            max-width: 520px;
            width: 100%;
            text-align: center;
            padding: 48px 32px;
            border-radius: 24px;
            background: linear-gradient(135deg, #1a221d 0%, #0d120f 100%);
            border: 1px solid rgba(197, 160, 89, 0.35);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.45);
        }

        .ty-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: rgba(197, 160, 89, 0.15);
            border: 1px solid rgba(197, 160, 89, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;

            font-size: clamp(2rem, 6vw, 2.75rem);
            font-weight: 600;
            line-height: 1.15;
            margin-bottom: 16px;
            color: #fff;
        }

        .ty-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.82);
            margin-bottom: 28px;
        }

        .ty-contacts {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 32px;
        }

            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            border: 1px solid rgba(197, 160, 89, 0.4);
            background: rgba(197, 160, 89, 0.1);
            color: #fff;
            text-decoration: none;
            font-size: 0.8rem;
            transition: background 0.25s ease, border-color 0.25s ease;
        }

        .ty-contact:hover {
            background: rgba(197, 160, 89, 0.22);
            border-color: var(--primary);
        }

        .ty-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 8px;
            background: var(--primary);
            color: #1a1208;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            transition: background 0.25s ease, transform 0.25s ease;
        }

        .ty-btn:hover {
            background: #e5c17b;
            transform: translateY(-2px);
        }

        .ty-footer {
            padding: 20px;
            text-align: center;
